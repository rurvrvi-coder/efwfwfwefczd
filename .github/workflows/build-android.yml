name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v2
        with:
          gradle-version: '8.0'

      - name: Build APK
        working-directory: android-native
        run: |
          gradle wrapper --gradle-version 8.0
          ./gradlew assembleRelease --no-daemon

      - name: List APK files
        run: |
          find . -name "*.apk" -type f -ls

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: tg-ws-proxy-apk
          path: android-native/app/build/outputs/apk/release/*.apk
          retention-days: 14
